server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Next.js assets can be cached aggressively.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static export emits both `route.html` and `route/index.html`; try both.
    location / {
        try_files $uri $uri.html $uri/index.html /404.html;
    }

    error_page 404 /404.html;
}
